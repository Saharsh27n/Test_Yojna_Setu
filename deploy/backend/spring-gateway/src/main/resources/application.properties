server.port=${PORT:8080}
spring.application.name=yojna-setu-gateway

# ── PostgreSQL (Supabase Session Pooler) ──────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-0-ap-southeast-1.pooler.supabase.com:5432/postgres?sslmode=require&prepareThreshold=0}
spring.datasource.username=${DB_USER:postgres.skietxmtgorikxbpcxpa}
spring.datasource.password=${DB_PASS:Rudracs@2004}
spring.datasource.driver-class-name=org.postgresql.Driver
# HikariCP pool — keep small for Supabase free tier (max 60 connections)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Flyway manages the schema — never let Hibernate auto-create
spring.jpa.hibernate.ddl-auto=validate

# ── Flyway Migrations ──────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=true
spring.flyway.connect-retries=3

# JWT
app.jwt.secret=${JWT_SECRET:yojna-setu-super-secret-key-2024-change-in-prod}
app.jwt.expiration-ms=86400000

# FastAPI AI Hub URL
app.fastapi.url=${FASTAPI_URL:http://localhost:8001}

# CORS
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173},http://localhost:3000

# Logging
logging.level.com.yojnasetu=INFO
logging.level.org.springframework.security=WARN
logging.level.org.flywaydb=INFO

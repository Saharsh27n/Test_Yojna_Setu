# MongoDB connectivity
spring.data.mongodb.uri=${MONGO_URI:mongodb+srv://pranjal11246_db_user:Battosai#11246@cluster0.cs1902j.mongodb.net/yojnadb?retryWrites=true&w=majority&appName=Cluster0}


# HikariCP pool — keep small for Supabase free tier (max 60 connections)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Flyway manages the schema — never let Hibernate auto-create
spring.jpa.hibernate.ddl-auto=validate


# JWT
app.jwt.secret=${JWT_SECRET:yojna-setu-super-secret-key-2024-change-in-prod}
app.jwt.expiration-ms=86400000

# FastAPI AI Hub URL
